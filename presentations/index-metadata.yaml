introduction:
  description: Why software engineering matters in research, how the course is structured, and where modern tooling and AI fit in.
  audience: Framing
object_oriented:
  description: How to use classes to encapsulate data and behavior, and how inheritance and composition can make code more maintainable.
  audience: Paradigms
functional:
  description: Core functional programming concepts, including pure functions, immutability, and higher-order functions.
  audience: Paradigms
version_control:
  description: A practical Git foundation for safer collaboration, reproducibility, and confident control over changes in your code.
  audience: Collaboration
collaborative_code_development:
  description: Working effectively with branches, pull requests, issue trackers, and code review in shared repositories.
  audience: Collaboration
testing:
  description: Strategies for how to test effectively to improve reliability, including unit and integration testing, and test-driven development.
  audience: Tooling
continuous_integration:
  description: Setting up automated testing and quality checks with continuous integration tools to catch issues early and maintain code health.
  audience: Tooling
packaging_dependency:
  description: How to package and manage dependencies so software stays reusable and distributable.
  audience: Environments
containerisation:
  description: Using Docker to package applications and environments consistently across development, CI, and deployment.
  audience: Deployment
hpc:
  description: An introduction to high-performance computing concepts, architectures, and use-cases.
  audience: Infrastructure
snakemake:
  description: Building reproducible computational workflows with rules, dependencies, and easy scalability.
  audience: Scalability